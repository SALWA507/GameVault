<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Panier</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <div class="max-w-3xl mx-auto p-4">

    <h1 class="text-3xl font-bold mb-6 text-center"> Mon Panier</h1>

    <!-- Cart -->
    <div id="cart-container" class="space-y-4"></div>

    <!-- Total -->
    <div class="bg-white p-4 rounded shadow mt-6 flex justify-between">
      <h2 class="font-bold text-lg">Total :</h2>
      <h2 id="total" class="font-bold text-green-600 text-lg"></h2>
    </div>

    <!-- Button -->
    <button id="orderBtn"
      class="w-full mt-4 bg-green-500 hover:bg-green-600 text-white py-3 rounded-lg font-bold">
      Commander
    </button>
    

  </div>

  <script src="js/panier.js"></script>
</body>
</html>
